<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>我的红包</title>
    <link rel="stylesheet" href="css/globle.css">
    <link rel="stylesheet" href="node_modules/normalize.css/normalize.css">
    <link rel="stylesheet" href="node_modules/@fortawesome/fontawesome-free/css/all.css">
    <link rel="stylesheet" href="css/property.css">
    <script src="js/property.js"></script>
</head>
<body>
<div class="wrapper">

    <div class="header">
        <div id="tabRedPacket" class="tab active" style="flex:1" onclick="switchTab(1)">
            红包
            <span class="badge">24</span>
        </div>
        <div id="tabTicket" class="tab" style="flex:1" onclick="switchTab(2)">券</div>
        <div class="tab" style="flex:3">&nbsp;</div>
        <div class="underline"></div>
    </div>


    <div class="filter">
        <div class="filterTag active">默认排序</div>
        <div class="filterTag">超级吃货卡</div>
        <div class="filterTag">平台红包</div>
        <div class="filterTag">商品红包</div>
        <div class="filterTag">店铺红包</div>
    </div>

    <div class="main">
        <div id="RedPacketList"  class="RedPacketList">
            <!-- 购物爆红包 -->
            <div class="RedPacketItem">
                <div class="packetHeader">
                    <div class="expireTag">将到期</div>
                    <div class="packetIcon">
                        <i class="fas fa-yen-sign"></i>
                    </div>
                    <div class="packetInfo">
                        <div class="packetName">购物爆红包</div>
                        <div class="packetExpire">今日23:59 到期</div>
                    </div>
                    <div class="packetAmount">
                        <div class="amountValue">
                            <div class="yenSign">¥</div>
                            <div>15</div>
                        </div>
                        <div class="amountCondition">满15可用</div>
                    </div>
                </div>
                <div class="packetFooter">
                    <span>实付金额不低于0.01元</span>
                    <i class="fas fa-chevron-down"></i>
                </div>
            </div>

            <!-- 买药新客红包 -->
            <div class="RedPacketItem">
                <div class="packetHeader">
                    <div class="expireTag">将到期</div>
                    <div class="packetIcon">
                        <i class="fas fa-yen-sign"></i>
                    </div>
                    <div class="packetInfo">
                        <div class="packetName">买药新客红包</div>
                        <div class="packetExpire">今日23:59 到期</div>
                    </div>
                    <div class="packetAmount">
                        <div class="amountValue">¥6</div>
                        <div class="amountCondition">满10可用</div>
                    </div>
                </div>
                <div class="packetFooter">
                    <span>满10元可用（使用门槛=商品现价+打包费-所有店铺优惠）</span>
                    <i class="fas fa-chevron-down"></i>
                </div>
            </div>

            <!-- 爆红包10元 -->
            <div class="RedPacketItem">
                <div class="packetHeader">
                    <div class="expireTag">将到期</div>
                    <div class="packetIcon">
                        <i class="fas fa-yen-sign"></i>
                    </div>
                    <div class="packetInfo">
                        <div class="packetName">爆红包</div>
                        <div class="packetExpire">今日23:59 到期</div>
                    </div>
                    <div class="packetAmount">
                        <div class="amountValue">¥10</div>
                        <div class="amountCondition">满35可用</div>
                    </div>
                </div>
                <div class="packetFooter">
                    <span>满35元可用（使用门槛=商品现价+打包费-所有店铺优惠）</span>
                    <i class="fas fa-chevron-down"></i>
                </div>
            </div>

            <!-- 爆红包7元 -->
            <div class="RedPacketItem">
                <div class="packetHeader">
                    <div class="expireTag">将到期</div>
                    <div class="packetIcon">
                        <i class="fas fa-yen-sign"></i>
                    </div>
                    <div class="packetInfo">
                        <div class="packetName">爆红包</div>
                        <div class="packetExpire">今日23:59 到期</div>
                    </div>
                    <div class="packetAmount">
                        <div class="amountValue">¥7</div>
                        <div class="amountCondition">满25可用</div>
                    </div>
                </div>
                <div class="packetFooter">
                    <span>满25元可用（使用门槛=商品现价+打包费-所有店铺优惠）</span>
                    <i class="fas fa-chevron-down"></i>
                </div>
            </div>
        </div>
        <div class="TicketList" id="TicketList">
            <div class="emptyState">
                <div class="emptyIcon">
                    <div class="doc">
                        <div class="lines">
                            <div class="line"></div>
                            <div class="line"></div>
                            <div class="line"></div>
                            <div class="line"></div>
                        </div>
                    </div>
                    <i class="fas fa-star sparkle"></i>
                    <i class="fas fa-star sparkle small"></i>
                </div>
                <div class="emptyTitle">没有可用券</div>
                <div class="emptySubtitle">诶嘿，居然一张券都没有</div>
            </div>
        </div>
    </div>

    <!-- 底部导航 -->
    <div class="footer footer-redpacket active" id="footerRedPacket">
        <div>历史红包</div>
        <div>兑换码</div>
        <div>领红包</div>
    </div>
    <div class="footer footerTicket" id="footerTicket">
        <div>历史券</div>
    </div>
</div>
</body>
</html>
