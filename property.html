<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>我的红包</title>
    <link rel="stylesheet" href="css/globle.css">
    <link rel="stylesheet" href="node_modules/normalize.css/normalize.css">
    <link rel="stylesheet" href="node_modules/@fortawesome/fontawesome-free/css/all.css">
    <link rel="stylesheet" href="css/property.css">
    <script src="js/property.js"></script>
</head>
<body>
<div class="wrapper">

    <div class="header">
        <div class="tab active">
            红包
            <span class="badge">24</span>
        </div>
        <div class="tab">券</div>
    </div>


    <div class="filter">
        <div class="filterTag active">默认排序</div>
        <div class="filterTag">超级吃货卡</div>
        <div class="filterTag">平台红包</div>
        <div class="filterTag">商品红包</div>
        <div class="filterTag">店铺红包</div>
    </div>

    <div class="main">
        <div class="red-packet-list">
            <!-- 购物爆红包 -->
            <div class="red-packet-item">
                <div class="packet-header">
                    <div class="expire-tag">将到期</div>
                    <div class="packet-icon">
                        <i class="fas fa-yen-sign"></i>
                    </div>
                    <div class="packet-info">
                        <div class="packet-name">购物爆红包</div>
                        <div class="packet-expire">今日23:59 到期</div>
                    </div>
                    <div class="packet-amount">
                        <div class="amount-value">¥15</div>
                        <div class="amount-condition">满15可用</div>
                    </div>
                </div>
                <div class="packet-footer">
                    <span>实付金额不低于0.01元</span>
                    <i class="fas fa-chevron-down"></i>
                </div>
            </div>

            <!-- 买药新客红包 -->
            <div class="red-packet-item">
                <div class="packet-header">
                    <div class="expire-tag">将到期</div>
                    <div class="packet-icon">
                        <i class="fas fa-yen-sign"></i>
                    </div>
                    <div class="packet-info">
                        <div class="packet-name">买药新客红包</div>
                        <div class="packet-expire">今日23:59 到期</div>
                    </div>
                    <div class="packet-amount">
                        <div class="amount-value">¥6</div>
                        <div class="amount-condition">满10可用</div>
                    </div>
                </div>
                <div class="packet-footer">
                    <span>满10元可用（使用门槛=商品现价+打包费-所有店铺优惠）</span>
                    <i class="fas fa-chevron-down"></i>
                </div>
            </div>

            <!-- 爆红包10元 -->
            <div class="red-packet-item">
                <div class="packet-header">
                    <div class="expire-tag">将到期</div>
                    <div class="packet-icon">
                        <i class="fas fa-yen-sign"></i>
                    </div>
                    <div class="packet-info">
                        <div class="packet-name">爆红包</div>
                        <div class="packet-expire">今日23:59 到期</div>
                    </div>
                    <div class="packet-amount">
                        <div class="amount-value">¥10</div>
                        <div class="amount-condition">满35可用</div>
                    </div>
                </div>
                <div class="packet-footer">
                    <span>满35元可用（使用门槛=商品现价+打包费-所有店铺优惠）</span>
                    <i class="fas fa-chevron-down"></i>
                </div>
            </div>

            <!-- 爆红包7元 -->
            <div class="red-packet-item">
                <div class="packet-header">
                    <div class="expire-tag">将到期</div>
                    <div class="packet-icon">
                        <i class="fas fa-yen-sign"></i>
                    </div>
                    <div class="packet-info">
                        <div class="packet-name">爆红包</div>
                        <div class="packet-expire">今日23:59 到期</div>
                    </div>
                    <div class="packet-amount">
                        <div class="amount-value">¥7</div>
                        <div class="amount-condition">满25可用</div>
                    </div>
                </div>
                <div class="packet-footer">
                    <span>满25元可用（使用门槛=商品现价+打包费-所有店铺优惠）</span>
                    <i class="fas fa-chevron-down"></i>
                </div>
            </div>
        </div>
    </div>

    <!-- 底部导航 -->
    <div class="footer">
        <div>历史红包</div>
        <div>兑换码</div>
        <div>领红包</div>
    </div>
</div>
</body>
</html>
