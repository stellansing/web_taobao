<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>支付确认</title>
    <link rel="stylesheet" href="node_modules/normalize.css/normalize.css">
    <link rel="stylesheet" href="node_modules/@fortawesome/fontawesome-free/css/all.css">
    <link rel="stylesheet" href="css/globle.css">
    <script src="js/pay.js"></script>
    <link rel="stylesheet" href="css/pay.css">
</head>
<body>
<div class="wrapper">
    <!-- 顶部信息 -->
    <div class="pay-header">
        <div class="pay-timer">支付剩余时间 14：55</div>
        <div class="pay-amount">
            <span class="symbol">¥</span>
            <span class="num">21.96</span>
        </div>
        <div class="pay-store">杭景元 · 东北老式麻辣烫(昆明翰林大店)</div>
    </div>

    <!-- 支付方式列表 -->
    <div class="pay-methods">
        <!-- 支付宝 -->
        <div class="method-item">
            <div class="method-left">
                <div class="method-icon alipay">支</div>
                <span class="method-name">支付宝</span>
            </div>
            <div class="method-right">
                <div class="radio checked"></div>
            </div>
        </div>
        <!-- 微信支付 -->
        <div class="method-item">
            <div class="method-left">
                <i class="fa-brands fa-weixin wechat"></i>
                <span class="method-name">微信支付</span>
            </div>
            <div class="method-right">
                <div class="radio"></div>
            </div>
        </div>
    </div>

    <!-- 底部按钮 -->
    <div class="pay-footer">
        <button class="pay-btn" onclick="alert('支付功能开发中')">确认支付</button>
    </div>
</div>
<script src="js/pay.js"></script>
</body>
</html>
